name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # PACK-3/PACK-5 diff against merge-base(origin/main, HEAD); the default
          # depth-1 clone has no common ancestor on pull_request runs (F-176 —
          # surfaced by the repo's first PR; push-to-main degenerated to HEAD).
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: gates (doctor, spec-lint, obspec-lint, typecheck, biome, test)
        run: bun run gates
      - name: contribution gate (OSS-4)
        run: node scripts/contribution-check.mjs
      - name: quickstart end-to-end + clean init + npm pack dry-run (OSS-1/OSS-5)
        run: node scripts/quickstart-check.mjs
      - name: pack version-bump lint (PACK-3)
        run: |
          git fetch origin main
          bun scripts/pack-bump-check.mjs "$(git merge-base origin/main HEAD)"
      - name: changelog append-only (PACK-5)
        run: |
          git fetch origin main
          node scripts/changelog-check.mjs "$(git merge-base origin/main HEAD)"

  install-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: clean-machine install test (OSS-1, macOS half)
        run: node scripts/quickstart-check.mjs

  tlc:
    # LOOP-5/DSL-5: the loop state machine model-checks in CI (TLC).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: model-check ObligatoLoop (I1, I2, I3, TypeOK)
        run: |
          curl -sL -o /tmp/tla2tools.jar https://github.com/tlaplus/tlaplus/releases/download/v1.8.0/tla2tools.jar
          java -cp /tmp/tla2tools.jar tlc2.TLC -deadlock -workers auto specs/tla/ObligatoLoop.tla -config specs/tla/ObligatoLoop.cfg
